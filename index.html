<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PillScan — Pill Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00e5a0;
    --accent2: #7c5cfc;
    --warn: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(0,229,160,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 80%, rgba(124,92,252,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px 32px 40px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }

  .logo {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .badge {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  /* Config */
  .config-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    cursor: pointer;
    width: fit-content;
    user-select: none;
  }

  .config-toggle span {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }

  .config-toggle:hover span { color: var(--accent); }

  .config-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 6px var(--warn);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }

  .config-status.ready {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }

  .config-panel.hidden { display: none; }

  .field label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    height: 38px;
  }

  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.97); }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    align-items: start;
  }

  .camera-section,
  .detection-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bottom-bar {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: start;
  }

  .bottom-bar .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 220px;
  }

  .bottom-bar .status-msg {
    text-align: left;
  }

  .camera-wrapper {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 4/3;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .camera-placeholder svg { opacity: 0.25; }

  .camera-placeholder p {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
    animation: scan 1.8s linear infinite;
    display: none;
    opacity: 0.8;
    z-index: 10;
  }

  @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
  .scanning .scan-line { display: block; }

  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
    z-index: 5;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .controls-btns {
    display: flex;
    gap: 10px;
  }

  .btn-cam {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-cam:hover { border-color: var(--accent); color: var(--accent); }

  .btn-capture {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    color: #000;
    font-family: var(--display);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-capture:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-capture:not(:disabled):hover { opacity: 0.85; }
  .btn-capture:not(:disabled):active { transform: scale(0.97); }

  .btn-capture .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.25);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-capture.loading .lbl { display: none; }
  .btn-capture.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
  }
  .status-msg.err { color: var(--warn); }
  .status-msg.ok { color: var(--accent); }

  /* Results */
  .results-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .snapshot-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 4/3;
  }

  .snapshot-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .snapshot-ph {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    padding: 24px;
    text-align: center;
  }

  .counts-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .counts-head {
    padding: 12px 16px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .total-pill {
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    min-width: 24px;
    text-align: center;
  }

  .counts-body {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px 24px;
    min-height: 56px;
    align-items: center;
  }

  .counts-ph {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }

  .pill-row {
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pill-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill-name {
    flex: 1;
    font-size: 0.78rem;
    color: var(--text);
    text-transform: capitalize;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pill-bar-bg {
    width: 55px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .pill-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .pill-count {
    font-size: 0.9rem;
    min-width: 22px;
    text-align: right;
    color: var(--text);
  }

  .conf-foot {
    padding: 8px 16px;
    font-size: 0.65rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: none;
  }
  .conf-foot.show { display: block; }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
    .config-panel { grid-template-columns: 1fr 1fr; }
    .config-panel .btn-save { grid-column: span 2; }
  }

  @media (max-width: 480px) {
    .config-panel { grid-template-columns: 1fr; }
    .config-panel .btn-save { grid-column: 1; }
    .logo { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Pill<span>Scan</span></div>
    <div class="badge">Roboflow AI</div>
  </header>

  <div class="config-toggle" id="configToggle" onclick="toggleConfig()">
    <div class="config-status" id="configDot"></div>
    <span id="configLabel">API Settings ▾</span>
  </div>

  <div class="config-panel" id="configPanel">
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="rf_xxxxxxxxxxxxxxxx">
    </div>
    <div class="field">
      <label>Workspace</label>
      <input type="text" id="workspace" value="test-1-et5em">
    </div>
    <div class="field">
      <label>Workflow ID</label>
      <input type="text" id="workflowId" value="pills">
    </div>
    <button class="btn-save" onclick="saveConfig()">Save</button>
  </div>

  <div class="main-grid">

    <!-- Top: camera feed -->
    <div class="camera-section">
      <div class="panel-label">Live Camera</div>
      <div class="camera-wrapper" id="cameraWrap">
        <div class="camera-placeholder" id="camPH">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p>Camera off</p>
        </div>
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="scan-line" id="scanLine"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>

    <!-- Top: detection result -->
    <div class="detection-section">
      <div class="panel-label">Detection Result</div>
      <div class="snapshot-wrap" id="snapshotWrap">
        <div class="snapshot-ph" id="snapshotPH">Annotated image will appear here</div>
        <img id="snapshotImg" alt="Annotated capture">
      </div>
    </div>

    <!-- Bottom: controls + counts spanning full width -->
    <div class="bottom-bar">
      <div class="controls">
        <div class="controls-btns">
          <button class="btn-cam" id="btnCam" onclick="toggleCamera()">▶ Start Camera</button>
          <button class="btn-capture" id="btnCapture" onclick="capture()" disabled>
            <span class="lbl">⬤ Capture &amp; Analyse</span>
            <div class="spinner"></div>
          </button>
        </div>
        <div class="status-msg" id="statusMsg">Enter your API key above to get started.</div>
      </div>

      <div class="counts-wrap">
        <div class="counts-head">
          <span>Pills by Type</span>
          <span class="total-pill" id="totalBadge">0</span>
        </div>
        <div class="counts-body" id="countsBody">
          <div class="counts-ph" id="countsPH">No detections yet</div>
        </div>
        <div class="conf-foot" id="confFoot"></div>
      </div>
    </div>

  </div>
</div>

<!-- Hidden canvas for frame capture -->
<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
const COLORS = [
  '#00e5a0','#7c5cfc','#ff6b6b','#ffd166','#06d6a0',
  '#118ab2','#ef476f','#ffc43d','#1b9aaa','#c77dff',
  '#ff9f1c','#2ec4b6','#e71d36','#4cc9f0','#f72585'
];

let stream = null;
let cameraOn = false;
let busy = false;
let configOpen = true;

const cfg = {
  apiKey: localStorage.getItem('rf_key') || '',
  workspace: localStorage.getItem('rf_ws') || 'test-1-et5em',
  workflowId: localStorage.getItem('rf_wf') || 'pills'
};

// ── Boot ─────────────────────────────────────────────────────
(function init() {
  document.getElementById('apiKey').value = cfg.apiKey;
  document.getElementById('workspace').value = cfg.workspace;
  document.getElementById('workflowId').value = cfg.workflowId;
  refreshDot();
  if (cfg.apiKey) {
    collapseConfig();
    setStatus('API key loaded. Start the camera to begin.', '');
  }
})();

// ── Config ───────────────────────────────────────────────────
function toggleConfig() {
  configOpen ? collapseConfig() : expandConfig();
}

function expandConfig() {
  configOpen = true;
  document.getElementById('configPanel').classList.remove('hidden');
  document.getElementById('configLabel').textContent = 'API Settings ▾';
}

function collapseConfig() {
  configOpen = false;
  document.getElementById('configPanel').classList.add('hidden');
  document.getElementById('configLabel').textContent = 'API Settings ▸';
}

function saveConfig() {
  cfg.apiKey    = document.getElementById('apiKey').value.trim();
  cfg.workspace = document.getElementById('workspace').value.trim() || 'test-1-et5em';
  cfg.workflowId= document.getElementById('workflowId').value.trim() || 'pills';
  localStorage.setItem('rf_key', cfg.apiKey);
  localStorage.setItem('rf_ws',  cfg.workspace);
  localStorage.setItem('rf_wf',  cfg.workflowId);
  refreshDot();
  if (cfg.apiKey) {
    setStatus('Config saved. Start the camera to begin.', 'ok');
    setTimeout(collapseConfig, 600);
  } else {
    setStatus('Please enter your Roboflow API key.', 'err');
  }
}

function refreshDot() {
  document.getElementById('configDot').classList.toggle('ready', !!cfg.apiKey);
}

// ── Camera ───────────────────────────────────────────────────
async function toggleCamera() {
  cameraOn ? stopCamera() : await startCamera();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } },
      audio: false
    });
    const v = document.getElementById('videoEl');
    v.srcObject = stream;
    v.style.display = 'block';
    document.getElementById('camPH').style.display = 'none';
    document.getElementById('btnCam').textContent = '■ Stop Camera';
    document.getElementById('btnCapture').disabled = false;
    cameraOn = true;
    setStatus('Camera ready — press Capture & Analyse.', '');
  } catch(e) {
    setStatus('Camera access denied or unavailable.', 'err');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; cameraOn = false;
  const v = document.getElementById('videoEl');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('camPH').style.display = 'flex';
  document.getElementById('btnCam').textContent = '▶ Start Camera';
  document.getElementById('btnCapture').disabled = true;
  setStatus('Camera stopped.', '');
}

// ── Capture ──────────────────────────────────────────────────
async function capture() {
  if (!cfg.apiKey) {
    setStatus('Enter your API key in settings first.', 'err');
    expandConfig(); return;
  }
  if (!cameraOn || busy) return;

  busy = true;
  setLoading(true);
  setStatus('Sending to Roboflow…', '');
  document.getElementById('cameraWrap').classList.add('scanning');

  // Grab video frame
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('hiddenCanvas');
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const b64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];

  try {
    const data = await callWorkflow(b64);
    renderResults(data, canvas);
    setStatus('Detection complete ✓', 'ok');
  } catch(e) {
    setStatus('Error: ' + (e.message || 'Workflow call failed'), 'err');
    console.error(e);
  } finally {
    busy = false;
    setLoading(false);
    document.getElementById('cameraWrap').classList.remove('scanning');
  }
}

// ── Roboflow API ─────────────────────────────────────────────
async function callWorkflow(b64) {
  const url = `https://detect.roboflow.com/infer/workflows/${cfg.workspace}/${cfg.workflowId}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      api_key: cfg.apiKey,
      inputs: { image: { type: 'base64', value: b64 } }
    })
  });

  if (!res.ok) {
    const txt = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(txt); msg = j.message || j.error || msg; } catch(_) {}
    throw new Error(msg + ': ' + txt.slice(0, 100));
  }
  return res.json();
}

// ── Render ───────────────────────────────────────────────────
function renderResults(data, fallbackCanvas) {
  if (!data) { setStatus('Empty response from API.', 'err'); return; }
  const out = Array.isArray(data.outputs) ? (data.outputs[0] || {}) : data;

  // 1. Annotated image — handle both {value: "b64"} and raw "b64" string shapes
  function extractImage(v) {
    if (!v) return null;
    if (typeof v === 'string' && v.length > 100) return v;         // raw base64
    if (typeof v?.value === 'string' && v.value.length > 100) return v.value; // {value: b64}
    return null;
  }
  const imgB64 =
    extractImage(out?.annotated_image) ||
    extractImage(out?.mask_viz)        ||
    extractImage(out?.label_viz)       ||
    extractImage(out?.visualization)   ||
    extractImage(out?.output_image)    ||
    null;
  console.log('[PillScan] imgB64 found:', !!imgB64, '| annotated_image type:', typeof out?.annotated_image);

  const img  = document.getElementById('snapshotImg');
  const imgPH = document.getElementById('snapshotPH');

  if (imgB64) {
    img.src = 'data:image/jpeg;base64,' + imgB64;
    img.style.display = 'block';
    imgPH.style.display = 'none';
  } else {
    // Fall back to raw captured frame
    img.src = fallbackCanvas.toDataURL('image/jpeg', 0.85);
    img.style.display = 'block';
    imgPH.style.display = 'none';
  }

  // 2. Predictions — dig into common result shapes
  // Log full output to help debug response shape
  console.log('[PillScan] API out:', JSON.stringify(out, null, 2));

  function extractPreds(obj) {
    if (!obj) return null;
    if (Array.isArray(obj)) return obj;
    if (Array.isArray(obj.predictions)) return obj.predictions;
    // Recurse one level into any object values
    for (const val of Object.values(obj)) {
      if (val && typeof val === 'object') {
        const found = extractPreds(val);
        if (found && found.length >= 0) return found;
      }
    }
    return null;
  }

  const preds = extractPreds(out) || [];
  console.log('[PillScan] preds found:', preds.length);

  // 3. Count by class
  const counts = {};
  const confByClass = {};
  for (const p of preds) {
    const cls = (p.class || p.class_name || 'unknown').trim();
    counts[cls] = (counts[cls] || 0) + 1;
    if (!confByClass[cls]) confByClass[cls] = [];
    confByClass[cls].push(p.confidence || 0);
  }

  renderCounts(counts, confByClass, preds.length);
}

function renderCounts(counts, confByClass, total) {
  document.getElementById('totalBadge').textContent = total;

  const body = document.getElementById('countsBody');
  const ph   = document.getElementById('countsPH');
  const foot = document.getElementById('confFoot');

  // Remove only pill rows, keep placeholder in DOM
  body.querySelectorAll('.pill-row').forEach(el => el.remove());

  if (total === 0) {
    if (ph) ph.style.display = 'block';
    foot.classList.remove('show');
    return;
  }

  if (ph) ph.style.display = 'none';

  const entries = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const max = entries[0][1];

  entries.forEach(([cls, count], i) => {
    const color = COLORS[i % COLORS.length];
    const row = document.createElement('div');
    row.className = 'pill-row';
    row.style.animationDelay = (i * 60) + 'ms';
    row.innerHTML = `
      <div class="pill-dot" style="background:${color};box-shadow:0 0 5px ${color}88"></div>
      <div class="pill-name" title="${cls}">${cls}</div>
      <div class="pill-bar-bg">
        <div class="pill-bar" style="width:${Math.round((count/max)*100)}%;background:${color}"></div>
      </div>
      <div class="pill-count">${count}</div>
    `;
    body.appendChild(row);
  });

  // Confidence footer — always update, even if confidence data is absent
  const allConf = Object.values(confByClass).flat();
  foot.classList.remove('show');
  if (allConf.length) {
    const avg = Math.round(allConf.reduce((a,b)=>a+b,0) / allConf.length * 100);
    foot.textContent = `Avg confidence: ${avg}% · ${total} instance${total!==1?'s':''} detected`;
  } else {
    foot.textContent = `${total} instance${total!==1?'s':''} detected`;
  }
  // Force reflow so classList change is noticed before re-adding
  void foot.offsetWidth;
  foot.classList.add('show');
}

// ── Helpers ──────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}

function setLoading(on) {
  const btn = document.getElementById('btnCapture');
  btn.classList.toggle('loading', on);
  btn.disabled = on || !cameraOn;
}
</script>
