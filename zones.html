<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PillScan — Zone Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00e5a0;
    --accent2: #7c5cfc;
    --warn: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(0,229,160,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 80%, rgba(124,92,252,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px 32px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .badge {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .nav {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
  }

  .nav a {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav a:hover { color: var(--accent); }
  .nav a.active { color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

  /* ── Config ── */
  .config-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    cursor: pointer;
    width: fit-content;
    user-select: none;
  }

  .config-toggle span {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }

  .config-toggle:hover span { color: var(--accent); }

  .config-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 6px var(--warn);
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .config-dot.ready { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }

  .config-panel.hidden { display: none; }

  .field label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    height: 38px;
  }

  .btn-save:hover { opacity: 0.85; }

  /* ── Main layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }

  .panel-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* ── Canvas wrapper (camera + zone drawing) ── */
  .canvas-section { display: flex; flex-direction: column; gap: 8px; }

  .canvas-outer {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: crosshair;
    width: 100%;
  }

  /* Canvas sizes itself — outer height driven by canvas element */
  #drawCanvas {
    display: block;
    width: 100%;
    height: auto;
  }

  #videoEl {
    display: none;
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }



  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    pointer-events: none;
  }

  .cam-placeholder svg { opacity: 0.2; }

  .cam-placeholder p {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
    animation: scan 1.8s linear infinite;
    display: none;
    z-index: 10;
  }

  @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
  .scanning .scan-line { display: block; }

  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.4;
    z-index: 5;
    pointer-events: none;
  }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* ── Zone toolbar ── */
  .zone-toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    border-radius: 7px;
    padding: 9px 16px;
    font-family: var(--mono);
    font-size: 0.76rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s, border-color 0.2s, color 0.2s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-family: var(--display);
    font-weight: 700;
  }

  .btn.primary:hover { opacity: 0.85; color: #000; }
  .btn.primary:disabled { opacity: 0.3; }

  .btn.danger { border-color: var(--warn); color: var(--warn); }
  .btn.danger:hover { background: var(--warn); color: #000; }

  .btn.active-mode {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(124,92,252,0.1);
  }

  .btn .spinner {
    display: none;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.25);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn.loading .lbl { display: none; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mode-hint {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-left: auto;
  }

  .mode-hint.active { color: var(--accent2); }

  /* ── Results side ── */
  .results-section { display: flex; flex-direction: column; gap: 12px; }

  /* Detection image */
  .det-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .det-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 10px;
  }

  .det-ph {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    padding: 20px;
  }

  /* ── Zone list ── */
  .zones-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .zone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: fadeUp 0.25s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .zone-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .zone-swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .zone-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    outline: none;
    min-width: 0;
  }

  .zone-name-input:focus {
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .zone-pill-count {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .zone-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
  }

  .zone-del:hover { color: var(--warn); }

  .zone-card-body {
    padding: 10px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 44px;
    align-items: center;
  }

  .zone-empty-text {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .pill-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.75rem;
    animation: fadeUp 0.2s ease forwards;
  }

  .pill-chip-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .pill-chip-count {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    margin-left: 2px;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .status-msg {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .status-msg.err { color: var(--warn); }
  .status-msg.ok  { color: var(--accent); }

  /* ── Add zone button ── */
  .add-zone-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .zone-name-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }

  .zone-name-field:focus { border-color: var(--accent2); }
  .zone-name-field::placeholder { color: var(--muted); }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .config-panel { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Pill<span>Scan</span></div>
    <div class="badge">Zone Detection</div>
  </header>

  <nav class="nav">
    <a href="index.html">Standard</a>
    <a href="zones.html" class="active">Zone Detection</a>
  </nav>

  <!-- Config -->
  <div class="config-toggle" onclick="toggleConfig()">
    <div class="config-dot" id="configDot"></div>
    <span id="configLabel">API Settings ▾</span>
  </div>

  <div class="config-panel" id="configPanel">
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="rf_xxxxxxxxxxxxxxxx">
    </div>
    <div class="field">
      <label>Workspace</label>
      <input type="text" id="workspace" value="test-1-et5em">
    </div>
    <div class="field">
      <label>Workflow ID</label>
      <input type="text" id="workflowId" value="pills">
    </div>
    <button class="btn-save" onclick="saveConfig()">Save</button>
  </div>

  <!-- Main -->
  <div class="main-grid">

    <!-- Left: camera + drawing canvas -->
    <div class="canvas-section">
      <div class="panel-label">Camera / Zone Editor</div>

      <div class="canvas-outer" id="canvasOuter">
        <div class="cam-placeholder" id="camPH">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p>Camera off</p>
        </div>
        <video id="videoEl" autoplay playsinline muted></video>
        <canvas id="drawCanvas"></canvas>
        <div class="scan-line" id="scanLine"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>

      <!-- Zone toolbar -->
      <div class="zone-toolbar">
        <button class="btn" id="btnCam" onclick="toggleCamera()">▶ Start Camera</button>

        <div class="add-zone-row">
          <input type="text" class="zone-name-field" id="zoneNameInput" placeholder="Zone name…" maxlength="20">
          <button class="btn" id="btnAddZone" onclick="startZone()" disabled>+ Draw Zone</button>
        </div>

        <button class="btn danger" id="btnClearZones" onclick="clearAllZones()" style="margin-left:auto">Clear All</button>
      </div>

      <div class="zone-toolbar" style="margin-top:4px;">
        <button class="btn primary" id="btnCapture" onclick="capture()" disabled>
          <span class="lbl">⬤ Capture &amp; Analyse</span>
          <div class="spinner"></div>
        </button>
        <span class="mode-hint" id="modeHint">Start camera to begin</span>
      </div>
    </div>

    <!-- Right: results -->
    <div class="results-section">
      <div class="panel-label">Detection Result</div>

      <div class="det-wrap" id="detWrap">
        <div class="det-ph" id="detPH">Annotated image will appear here</div>
        <img id="detImg" alt="Detection result">
      </div>

      <div class="panel-label" style="margin-top:4px;">Zones</div>
      <div class="zones-list" id="zonesList">
        <div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.06em;padding:8px 0;">
          Draw zones on the camera feed to count pills per area.
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="status-msg" id="statusMsg">Enter your API key and start the camera.</div>
  </div>

</div>

<!-- Hidden capture canvas -->
<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
// ── Constants ────────────────────────────────────────────────
const ZONE_COLORS = [
  '#00e5a0', '#7c5cfc', '#ff6b6b', '#ffd166',
  '#06d6a0', '#118ab2', '#ef476f', '#c77dff',
  '#ff9f1c', '#4cc9f0'
];

const PILL_COLORS = [
  '#00e5a0', '#ff6b6b', '#ffd166', '#7c5cfc',
  '#06d6a0', '#ff9f1c', '#4cc9f0', '#ef476f',
  '#c77dff', '#118ab2'
];

// ── State ────────────────────────────────────────────────────
let stream = null;
let cameraOn = false;
let busy = false;
let configOpen = true;

// Zone drawing state
let zones = [];           // [{id, name, color, points: [{x,y}…], closed}]
let drawingZone = null;   // zone currently being drawn
let mousePos = null;      // live cursor for preview line

// Last detections (normalized 0-1 coords)
let lastPredictions = [];

const cfg = {
  apiKey:     localStorage.getItem('rf_key') || '',
  workspace:  localStorage.getItem('rf_ws')  || 'test-1-et5em',
  workflowId: localStorage.getItem('rf_wf')  || 'pills'
};

// ── Boot ─────────────────────────────────────────────────────
(function init() {
  document.getElementById('apiKey').value    = cfg.apiKey;
  document.getElementById('workspace').value = cfg.workspace;
  document.getElementById('workflowId').value= cfg.workflowId;
  refreshDot();
  if (cfg.apiKey) {
    collapseConfig();
    setStatus('API key loaded. Start camera and draw zones.', '');
  }
  // On resize, CSS handles scaling — canvas resolution stays fixed to video native size
})();

// ── Config ───────────────────────────────────────────────────
function toggleConfig() { configOpen ? collapseConfig() : expandConfig(); }

function expandConfig() {
  configOpen = true;
  document.getElementById('configPanel').classList.remove('hidden');
  document.getElementById('configLabel').textContent = 'API Settings ▾';
}

function collapseConfig() {
  configOpen = false;
  document.getElementById('configPanel').classList.add('hidden');
  document.getElementById('configLabel').textContent = 'API Settings ▸';
}

function saveConfig() {
  cfg.apiKey     = document.getElementById('apiKey').value.trim();
  cfg.workspace  = document.getElementById('workspace').value.trim() || 'test-1-et5em';
  cfg.workflowId = document.getElementById('workflowId').value.trim() || 'pills';
  localStorage.setItem('rf_key', cfg.apiKey);
  localStorage.setItem('rf_ws',  cfg.workspace);
  localStorage.setItem('rf_wf',  cfg.workflowId);
  refreshDot();
  if (cfg.apiKey) { setStatus('Config saved.', 'ok'); setTimeout(collapseConfig, 600); }
  else setStatus('Please enter an API key.', 'err');
}

function refreshDot() {
  document.getElementById('configDot').classList.toggle('ready', !!cfg.apiKey);
}

// ── Camera ───────────────────────────────────────────────────
async function toggleCamera() {
  cameraOn ? stopCamera() : await startCamera();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: false
    });
    const v = document.getElementById('videoEl');
    v.srcObject = stream;
    v.style.display = 'block'; // needed for browser to decode frames
    document.getElementById('camPH').style.display = 'none';
    document.getElementById('btnCam').textContent = '■ Stop Camera';
    document.getElementById('btnCapture').disabled = false;
    document.getElementById('btnAddZone').disabled = false;
    cameraOn = true;
    setupCanvas();
    setStatus('Camera ready. Draw zones then capture.', '');
    setHint('Click canvas to start drawing a zone', true);
    requestAnimationFrame(videoLoop);
  } catch(e) {
    setStatus('Camera access denied or unavailable.', 'err');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; cameraOn = false;
  const v = document.getElementById('videoEl');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('camPH').style.display = 'flex';
  document.getElementById('btnCam').textContent = '▶ Start Camera';
  document.getElementById('btnCapture').disabled = true;
  document.getElementById('btnAddZone').disabled = true;
  setStatus('Camera stopped.', '');
  setHint('Start camera to begin', false);
}

// ── Canvas setup & rendering ─────────────────────────────────
function setupCanvas() {
  const canvas = document.getElementById('drawCanvas');

  // Wait for video metadata so we know the true resolution
  const video = document.getElementById('videoEl');
  const doSetup = () => {
    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;
    // Set canvas internal resolution to match video exactly
    canvas.width  = vw;
    canvas.height = vh;
    // CSS: full container width, height auto-follows aspect ratio
    canvas.style.width  = '100%';
    canvas.style.height = 'auto';
  };

  if (video.videoWidth) {
    doSetup();
  } else {
    video.addEventListener('loadedmetadata', doSetup, { once: true });
  }

  canvas.addEventListener('click',       onCanvasClick);
  canvas.addEventListener('mousemove',   onCanvasMouseMove);
  canvas.addEventListener('dblclick',    onCanvasDoubleClick);
  canvas.addEventListener('contextmenu', e => { e.preventDefault(); cancelDrawing(); });
}

// Animate camera feed into canvas background
function videoLoop() {
  if (!cameraOn) return;
  redraw();
  requestAnimationFrame(videoLoop);
}

function redraw() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  // Draw video frame — canvas is already sized to video resolution so no distortion
  const video = document.getElementById('videoEl');
  if (video.readyState >= 2) {
    // If canvas size drifted from video (e.g. camera changed), resync
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
    }
    ctx.drawImage(video, 0, 0);
  }

  // Draw completed zones
  for (const zone of zones) {
    drawZone(ctx, zone, w, h);
  }

  // Draw zone being drawn
  if (drawingZone && drawingZone.points.length > 0) {
    drawZoneInProgress(ctx, drawingZone, mousePos, w, h);
  }

  // Draw detection bounding boxes (if any)
  if (lastPredictions.length > 0) {
    drawDetections(ctx, lastPredictions, w, h);
  }
}

function drawZone(ctx, zone, w, h) {
  if (zone.points.length < 2) return;
  const pts = zone.points;
  const color = zone.color;

  ctx.beginPath();
  ctx.moveTo(pts[0].x * w, pts[0].y * h);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x * w, pts[i].y * h);
  ctx.closePath();

  // Fill
  ctx.fillStyle = hexToRgba(color, 0.15);
  ctx.fill();

  // Stroke
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.stroke();

  // Vertex dots
  for (const pt of pts) {
    ctx.beginPath();
    ctx.arc(pt.x * w, pt.y * h, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Label
  const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length * w;
  const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length * h;
  ctx.font = 'bold 13px "DM Mono", monospace';
  ctx.fillStyle = '#000';
  ctx.fillText(zone.name, cx + 1, cy + 1);
  ctx.fillStyle = color;
  ctx.fillText(zone.name, cx, cy);
}

function drawZoneInProgress(ctx, zone, mouse, w, h) {
  const pts = zone.points;
  const color = zone.color;

  ctx.beginPath();
  ctx.moveTo(pts[0].x * w, pts[0].y * h);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x * w, pts[i].y * h);

  if (mouse) ctx.lineTo(mouse.x, mouse.y);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Snap hint circle on first point
  ctx.beginPath();
  ctx.arc(pts[0].x * w, pts[0].y * h, 8, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  for (const pt of pts) {
    ctx.beginPath();
    ctx.arc(pt.x * w, pt.y * h, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }
}

function drawDetections(ctx, preds, w, h) {
  const classColorMap = {};
  let colorIdx = 0;

  for (const p of preds) {
    const cls = p.class || 'unknown';
    if (!classColorMap[cls]) classColorMap[cls] = PILL_COLORS[colorIdx++ % PILL_COLORS.length];
  }

  for (const p of preds) {
    const cls = p.class || 'unknown';
    const color = classColorMap[cls];
    const cx = p.x / p.image_width;
    const cy = p.y / p.image_height;
    const bw = p.width  / p.image_width;
    const bh = p.height / p.image_height;
    const x = (cx - bw / 2) * w;
    const y = (cy - bh / 2) * h;

    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y, bw * w, bh * h);

    // Centre dot
    ctx.beginPath();
    ctx.arc(cx * w, cy * h, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }
}

// ── Zone drawing interaction ──────────────────────────────────
function startZone() {
  const nameInput = document.getElementById('zoneNameInput');
  const name = nameInput.value.trim() || `Zone ${zones.length + 1}`;
  const color = ZONE_COLORS[zones.length % ZONE_COLORS.length];

  drawingZone = { id: Date.now(), name, color, points: [], closed: false };
  nameInput.value = '';
  setHint('Click to add points · Double-click or click first point to close · Right-click to cancel', true);
}

// Convert a mouse event to normalised 0-1 coordinates accounting for CSS scaling
function eventToNorm(e) {
  const canvas = document.getElementById('drawCanvas');
  const rect = canvas.getBoundingClientRect();
  // scaleX/Y = internal resolution / displayed CSS size
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX; // native canvas pixels
  const py = (e.clientY - rect.top)  * scaleY;
  return {
    nx: px / canvas.width,   // normalised 0-1
    ny: py / canvas.height,
    px, py                    // native pixels (for snap distance calc)
  };
}

function onCanvasClick(e) {
  if (!drawingZone) return;

  const { nx, ny, px, py } = eventToNorm(e);

  // Snap to first point to close if within 15 native pixels
  if (drawingZone.points.length >= 3) {
    const canvas = document.getElementById('drawCanvas');
    const fp = drawingZone.points[0];
    const dx = fp.x * canvas.width  - px;
    const dy = fp.y * canvas.height - py;
    if (Math.sqrt(dx*dx + dy*dy) < 15) {
      closeZone();
      return;
    }
  }

  drawingZone.points.push({ x: nx, y: ny });
}

function onCanvasMouseMove(e) {
  if (!drawingZone) return;
  const { px, py } = eventToNorm(e);
  // Store in native canvas pixels so drawZoneInProgress can use directly
  mousePos = { x: px, y: py };
}

function onCanvasDoubleClick(e) {
  if (!drawingZone || drawingZone.points.length < 3) return;
  // dblclick fires after two clicks, so one extra point was added — remove it
  drawingZone.points.pop();
  closeZone();
}

function closeZone() {
  if (!drawingZone || drawingZone.points.length < 3) {
    cancelDrawing();
    return;
  }
  drawingZone.closed = true;
  zones.push(drawingZone);
  drawingZone = null;
  mousePos = null;
  renderZoneCards();
  setHint(`Zone added. Draw another or capture.`, true);
  recomputeZoneCounts();
}

function cancelDrawing() {
  drawingZone = null;
  mousePos = null;
  setHint('Drawing cancelled. Draw a new zone or capture.', false);
}

function deleteZone(id) {
  zones = zones.filter(z => z.id !== id);
  renderZoneCards();
  recomputeZoneCounts();
}

function clearAllZones() {
  zones = [];
  drawingZone = null;
  mousePos = null;
  renderZoneCards();
  setHint('All zones cleared.', false);
}

// ── Zone result cards ─────────────────────────────────────────
function renderZoneCards() {
  const list = document.getElementById('zonesList');
  list.innerHTML = '';

  if (zones.length === 0) {
    list.innerHTML = '<div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.06em;padding:8px 0;">Draw zones on the camera feed to count pills per area.</div>';
    return;
  }

  for (const zone of zones) {
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.id = `zcard-${zone.id}`;

    card.innerHTML = `
      <div class="zone-card-head">
        <div class="zone-swatch" style="background:${zone.color};box-shadow:0 0 5px ${zone.color}88"></div>
        <input class="zone-name-input" value="${zone.name}" onchange="renameZone(${zone.id}, this.value)">
        <span class="zone-pill-count" id="ztotal-${zone.id}">— pills</span>
        <button class="zone-del" onclick="deleteZone(${zone.id})" title="Delete zone">✕</button>
      </div>
      <div class="zone-card-body" id="zbody-${zone.id}">
        <span class="zone-empty-text">Capture to count pills in this zone</span>
      </div>
    `;
    list.appendChild(card);
  }
}

function renameZone(id, name) {
  const zone = zones.find(z => z.id === id);
  if (zone) zone.name = name || zone.name;
}

// ── Capture & analyse ─────────────────────────────────────────
async function capture() {
  if (!cfg.apiKey) {
    setStatus('Enter your API key in settings first.', 'err');
    expandConfig(); return;
  }
  if (!cameraOn || busy) return;

  busy = true;
  setLoading(true);
  setStatus('Sending to Roboflow…', '');
  document.getElementById('canvasOuter').classList.add('scanning');

  const video = document.getElementById('videoEl');
  const hidden = document.getElementById('hiddenCanvas');
  hidden.width  = video.videoWidth  || 640;
  hidden.height = video.videoHeight || 480;
  hidden.getContext('2d').drawImage(video, 0, 0);
  const b64 = hidden.toDataURL('image/jpeg', 0.9).split(',')[1];

  try {
    const data = await callWorkflow(b64);
    processResults(data, hidden.width, hidden.height);
    setStatus('Detection complete ✓', 'ok');
  } catch(e) {
    setStatus('Error: ' + (e.message || 'Workflow failed'), 'err');
    console.error(e);
  } finally {
    busy = false;
    setLoading(false);
    document.getElementById('canvasOuter').classList.remove('scanning');
  }
}

async function callWorkflow(b64) {
  const url = `https://detect.roboflow.com/infer/workflows/${cfg.workspace}/${cfg.workflowId}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      api_key: cfg.apiKey,
      inputs: { image: { type: 'base64', value: b64 } }
    })
  });
  if (!res.ok) {
    const txt = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(txt); msg = j.message || j.error || msg; } catch(_) {}
    throw new Error(msg);
  }
  return res.json();
}

function processResults(data, imgW, imgH) {
  if (!data) return;
  const out = Array.isArray(data.outputs) ? (data.outputs[0] || {}) : data;

  // Show annotated image
  function extractImage(v) {
    if (!v) return null;
    if (typeof v === 'string' && v.length > 100) return v;
    if (typeof v?.value === 'string' && v.value.length > 100) return v.value;
    return null;
  }

  const imgB64 =
    extractImage(out?.annotated_image) ||
    extractImage(out?.mask_viz)        ||
    extractImage(out?.visualization)   ||
    null;

  const detImg = document.getElementById('detImg');
  const detPH  = document.getElementById('detPH');

  if (imgB64) {
    detImg.src = 'data:image/jpeg;base64,' + imgB64;
    detImg.style.display = 'block';
    detPH.style.display = 'none';
  }

  // Extract predictions
  function extractPreds(obj) {
    if (!obj) return null;
    if (Array.isArray(obj)) return obj;
    if (Array.isArray(obj.predictions)) return obj.predictions;
    for (const val of Object.values(obj)) {
      if (val && typeof val === 'object') {
        const found = extractPreds(val);
        if (found) return found;
      }
    }
    return null;
  }

  const preds = extractPreds(out) || [];
  console.log('[PillScan Zones] preds:', preds.length);

  // Attach image dimensions to each prediction for normalisation
  for (const p of preds) {
    if (!p.image_width)  p.image_width  = imgW;
    if (!p.image_height) p.image_height = imgH;
  }

  lastPredictions = preds;
  recomputeZoneCounts();
}

// ── Zone counting (point-in-polygon) ─────────────────────────
function recomputeZoneCounts() {
  if (zones.length === 0) return;

  const canvas = document.getElementById('drawCanvas');
  const cw = canvas.width, ch = canvas.height;

  // For each zone, count pills whose centre falls inside
  for (const zone of zones) {
    const counts = {};
    let total = 0;

    for (const p of lastPredictions) {
      const cls = p.class || p.class_name || 'unknown';

      // Normalised centre
      const nx = p.x / (p.image_width  || cw);
      const ny = p.y / (p.image_height || ch);

      if (pointInPolygon(nx, ny, zone.points)) {
        counts[cls] = (counts[cls] || 0) + 1;
        total++;
      }
    }

    // Update card
    const totalEl = document.getElementById(`ztotal-${zone.id}`);
    const bodyEl  = document.getElementById(`zbody-${zone.id}`);
    if (!totalEl || !bodyEl) continue;

    totalEl.textContent = `${total} pill${total !== 1 ? 's' : ''}`;

    bodyEl.innerHTML = '';
    if (total === 0) {
      bodyEl.innerHTML = '<span class="zone-empty-text">No pills detected in this zone</span>';
    } else {
      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      entries.forEach(([cls, cnt], i) => {
        const color = PILL_COLORS[i % PILL_COLORS.length];
        const chip = document.createElement('div');
        chip.className = 'pill-chip';
        chip.innerHTML = `
          <div class="pill-chip-dot" style="background:${color}"></div>
          <span>${cls}</span>
          <span class="pill-chip-count">${cnt}</span>
        `;
        bodyEl.appendChild(chip);
      });
    }
  }
}

// Ray-casting point-in-polygon (normalised coords)
function pointInPolygon(px, py, polygon) {
  let inside = false;
  const n = polygon.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    const intersect = ((yi > py) !== (yj > py)) &&
      (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// ── Helpers ───────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' ' + type : '');
}

function setHint(msg, active) {
  const el = document.getElementById('modeHint');
  el.textContent = msg;
  el.className = 'mode-hint' + (active ? ' active' : '');
}

function setLoading(on) {
  const btn = document.getElementById('btnCapture');
  btn.classList.toggle('loading', on);
  btn.disabled = on || !cameraOn;
}
</script>
